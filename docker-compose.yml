services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: fraud-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fraud-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: fraud-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://fraud-kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fraud-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: fraud-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: fraud-kafka:29092

  postgres:
    image: postgres:16
    container_name: fraud-postgres
    environment:
      POSTGRES_DB: fraud_detection
      POSTGRES_USER: fraud_user
      POSTGRES_PASSWORD: fraud_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud_user -d fraud_detection"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: fraud-pgadmin
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fraud.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"

  spark-master:
    build:
      context: .
      dockerfile: spark/Dockerfile
    image: fraud-spark:3.5.1
    container_name: fraud-spark-master
    user: root
    depends_on:
      - kafka
      - postgres
    ports:
      - "7077:7077"
      - "18081:8080"
    volumes:
      - ./spark:/opt/spark/fraud_app
      - ./ml:/opt/spark/ml
      - ./data:/opt/spark/data
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
      --host 0.0.0.0
  
  
  spark-worker:
    image: fraud-spark:3.5.1
    container_name: fraud-spark-worker
    user: root
    depends_on:
      - spark-master
    ports:
      - "18082:8081"
    volumes:
      - ./spark:/opt/spark/fraud_app
      - ./ml:/opt/spark/ml
      - ./data:/opt/spark/data
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://fraud-spark-master:7077


  airflow-postgres:
    image: postgres:16
    container_name: fraud-airflow-postgres
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  airflow-init:
    image: apache/airflow:2.9.3
    container_name: fraud-airflow-init
    depends_on:
      - airflow-postgres
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_ADMIN_USERNAME: admin
      AIRFLOW_ADMIN_PASSWORD: admin
      AIRFLOW_ADMIN_FIRSTNAME: Fraud
      AIRFLOW_ADMIN_LASTNAME: Admin
      AIRFLOW_ADMIN_EMAIL: admin@fraud.com
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./data/reports:/opt/airflow/reports
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Fraud
      --lastname Admin
      --role Admin
      --email admin@fraud.com
      "

  airflow-webserver:
    image: apache/airflow:2.9.3
    container_name: fraud-airflow-webserver
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      FRAUD_DB_HOST: fraud-postgres
      FRAUD_DB_PORT: 5432
      FRAUD_DB_NAME: fraud_detection
      FRAUD_DB_USER: fraud_user
      FRAUD_DB_PASSWORD: fraud_password
    ports:
      - "8088:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./data/reports:/opt/airflow/reports
    command: airflow webserver

  airflow-scheduler:
    image: apache/airflow:2.9.3
    container_name: fraud-airflow-scheduler
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      FRAUD_DB_HOST: fraud-postgres
      FRAUD_DB_PORT: 5432
      FRAUD_DB_NAME: fraud_detection
      FRAUD_DB_USER: fraud_user
      FRAUD_DB_PASSWORD: fraud_password
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./data/reports:/opt/airflow/reports
    command: airflow scheduler

volumes:
  postgres_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  airflow_postgres_data: